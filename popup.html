<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root{
    --bg:#fff;--surface:#f6f7f8;--text:#111318;--muted:#68707d;--faint:#979eaa;
    --line:#e6e8ec;--accent:#111318;--blue:#1d9bf0;--success:#16803d;
    --radius:10px;--ease:cubic-bezier(.2,.8,.2,1)
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{width:336px;background:var(--bg);color:var(--text);font-family:-apple-system,
    BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;-webkit-font-smoothing:antialiased}
  button,input,select{font:inherit}
  button,a,summary{outline:none}
  :focus-visible{box-shadow:0 0 0 3px rgba(29,155,240,.16)!important;border-color:var(--blue)!important}

  main{padding:20px 20px 18px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:30px;height:30px;border-radius:8px}
  .brand-copy{display:flex;flex-direction:column;gap:1px}
  .brand b{font-size:15px;line-height:1.2;letter-spacing:-.2px}
  .brand small,.ver{font-size:11px;color:var(--faint)}

  .field{margin-bottom:16px}
  .label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
  label,.field-label{font-size:12px;font-weight:600;color:#343840}
  .label-row a{font-size:11px;color:var(--muted);text-decoration:none}
  .label-row a:hover{color:var(--text)}
  .key-actions{display:flex;align-items:center;gap:10px}
  .test-key{padding:0;border:0;background:transparent;color:var(--blue);font-size:11px;cursor:pointer}
  .test-key:disabled{color:var(--faint);cursor:default}

  input,.select-button{width:100%;height:42px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--surface);color:var(--text);font-size:13px;transition:.16s var(--ease)}
  input:hover,.select-button:hover{border-color:#d3d6dc}
  input{padding:0 12px}
  input::placeholder{color:var(--faint)}
  .provider-picker{position:relative}
  .select-button{display:flex;align-items:center;justify-content:space-between;padding:0 12px;
    cursor:pointer;text-align:left}
  .select-button svg{color:var(--muted);transition:transform .16s var(--ease)}
  .select-button[aria-expanded="true"] svg{transform:rotate(180deg)}
  .provider-menu{position:absolute;z-index:20;top:calc(100% + 6px);left:0;right:0;padding:5px;
    border:1px solid var(--line);border-radius:12px;background:#fff;
    box-shadow:0 14px 32px rgba(17,19,24,.14)}
  .provider-menu[hidden]{display:none}
  .provider-option{width:100%;height:36px;padding:0 9px;border:0;border-radius:8px;background:transparent;
    color:var(--text);display:flex;align-items:center;justify-content:space-between;font-size:13px;cursor:pointer}
  .provider-option:hover,.provider-option:focus-visible{background:var(--surface)}
  .provider-option[aria-selected="true"]{font-weight:650}
  .provider-option svg{visibility:hidden;color:var(--blue)}
  .provider-option[aria-selected="true"] svg{visibility:visible}
  .style-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;border-radius:12px;background:var(--surface)}
  .style-option{height:34px;border:0;border-radius:8px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
  .style-option:hover{color:var(--text)}
  .style-option[aria-checked="true"]{background:#fff;color:var(--text);font-weight:650;box-shadow:0 1px 4px rgba(17,19,24,.1)}
  .key-wrap{position:relative}
  .key-wrap input{padding-right:42px}
  .key-toggle{position:absolute;right:5px;top:5px;width:32px;height:32px;border:0;border-radius:7px;
    background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer}
  .key-toggle:hover{background:#e9ebee;color:var(--text)}
  .key-toggle[aria-pressed="true"]::after{content:"";position:absolute;width:18px;height:1.5px;
    border-radius:2px;background:currentColor;transform:rotate(-45deg)}

  .option-row{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:13px 0;border-top:1px solid var(--line)}
  .option-copy{display:flex;flex-direction:column;gap:3px;min-width:0}
  .option-copy span{font-size:12px;font-weight:600}
  .option-copy small{font-size:11px;color:var(--faint);line-height:1.35}
  .switch{flex:0 0 auto;width:38px;height:22px;border:0;border-radius:99px;background:#d7dae0;
    padding:2px;cursor:pointer;transition:background .18s var(--ease)}
  .switch::after{content:"";display:block;width:18px;height:18px;border-radius:50%;background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.18);transition:transform .18s var(--ease)}
  .switch[aria-checked="true"]{background:var(--blue)}
  .switch[aria-checked="true"]::after{transform:translateX(16px)}
  .switch:disabled{opacity:.45;cursor:not-allowed}

  details{border-top:1px solid var(--line)}
  summary{display:flex;align-items:center;justify-content:space-between;padding:13px 0;
    color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"";width:7px;height:7px;border-right:1.5px solid currentColor;
    border-bottom:1.5px solid currentColor;transform:rotate(45deg);transition:transform .16s var(--ease);margin-right:3px}
  details[open] summary::after{transform:rotate(225deg)}
  details .field{margin:0 0 14px}
  .hint{font-size:11px;color:var(--faint);margin:6px 0 0;line-height:1.4}

  .privacy{display:flex;gap:7px;align-items:flex-start;color:var(--faint);font-size:10.5px;
    line-height:1.45;margin:13px 0 15px}
  .privacy svg{flex:0 0 auto;margin-top:1px}
  .save{width:100%;height:42px;border:0;border-radius:var(--radius);background:var(--accent);
    color:#fff;font-size:13px;font-weight:650;cursor:pointer;transition:.16s var(--ease)}
  .save:hover{background:#292c32}
  .save:active{transform:scale(.99)}
  .save.saved{background:var(--success)}
  .save.error{background:#b42318}

  footer{height:44px;padding:0 20px;border-top:1px solid var(--line);display:flex;
    align-items:center;justify-content:space-between;color:var(--faint);font-size:11px}
  footer nav{display:flex;gap:14px}
  footer a{color:var(--muted);text-decoration:none}
  footer a:hover{color:var(--text)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <img src="icons/icon32.png" alt="">
        <div class="brand-copy"><b>Quip</b><small>回复设置</small></div>
      </div>
      <span class="ver">v0.1.2</span>
    </header>

    <form id="settings">
      <div class="field">
        <div class="label-row"><span class="field-label" id="providerLabel">模型</span></div>
        <select id="provider" class="sr-only" tabindex="-1" aria-hidden="true">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="grok">Grok</option>
          <option value="claude">Claude</option>
        </select>
        <div class="provider-picker">
          <button type="button" class="select-button" id="providerButton" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="providerLabel providerValue">
            <span id="providerValue">DeepSeek</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m7 10 5 5 5-5"/></svg>
          </button>
          <div class="provider-menu" id="providerMenu" role="listbox" aria-labelledby="providerLabel" hidden>
            <button type="button" class="provider-option" role="option" data-value="deepseek" aria-selected="true"><span>DeepSeek</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"/></svg></button>
            <button type="button" class="provider-option" role="option" data-value="openai" aria-selected="false"><span>OpenAI</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"/></svg></button>
            <button type="button" class="provider-option" role="option" data-value="grok" aria-selected="false"><span>Grok</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"/></svg></button>
            <button type="button" class="provider-option" role="option" data-value="claude" aria-selected="false"><span>Claude</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"/></svg></button>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="label-row"><span class="field-label" id="styleLabel">回复风格</span></div>
        <div class="style-picker" id="stylePicker" role="radiogroup" aria-labelledby="styleLabel">
          <button type="button" class="style-option" role="radio" data-style="adaptive" aria-checked="true">自适应</button>
          <button type="button" class="style-option" role="radio" data-style="funny" aria-checked="false">幽默</button>
          <button type="button" class="style-option" role="radio" data-style="warm" aria-checked="false">真诚</button>
          <button type="button" class="style-option" role="radio" data-style="sharp" aria-checked="false">犀利</button>
        </div>
      </div>

      <div class="field">
        <div class="label-row">
          <label for="key" id="keyLabel">API Key</label>
          <span class="key-actions">
            <button class="test-key" id="testConnection" type="button"><span id="testLabel">测试连接</span></button>
            <a id="keyLink" href="#" target="_blank">获取 Key →</a>
          </span>
        </div>
        <div class="key-wrap">
          <input id="key" type="password" placeholder="粘贴 API Key" autocomplete="off" spellcheck="false">
          <button type="button" class="key-toggle" id="keyToggle" aria-label="显示 API Key" aria-pressed="false" title="显示 API Key">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6z"/><circle cx="12" cy="12" r="2.5"/></svg>
          </button>
        </div>
      </div>

      <div class="option-row">
        <div class="option-copy">
          <span id="visionLabel">读取推文图片</span>
          <small id="visionSub">结合配图生成回复</small>
        </div>
        <button type="button" class="switch" id="visionSwitch" role="switch" aria-labelledby="visionLabel" aria-checked="false"></button>
      </div>

      <details>
        <summary>高级设置</summary>
        <div class="field">
          <label for="model" class="field-label">自定义模型名</label>
          <input id="model" type="text" placeholder="使用默认模型" spellcheck="false">
          <p class="hint">留空即使用推荐的默认模型。</p>
        </div>
      </details>

      <p class="privacy">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Key 仅保存在本机；生成时，推文内容及已开启读取的图片会发送给所选模型商。
      </p>

      <button class="save" id="save" type="submit"><span id="saveLabel">保存设置</span></button>
      <span class="sr-only" id="status" role="status" aria-live="polite"></span>
    </form>
  </main>

  <footer>
    <span>开源 · 自带 Key</span>
    <nav><a href="https://github.com/huccct/Quip" target="_blank">GitHub</a><a href="https://x.com/orion_c29" target="_blank">X</a></nav>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
